    <circle cx="128" cy="128" r="98" stroke="#1A1C20" stroke-width="2" stroke-dasharray="8 8"/>
    
    <!-- Globe Grid (Atlas) - Ink -->
    <ellipse cx="128" cy="128" rx="52" ry="116" stroke="#1A1C20" stroke-width="6"/>
    <line x1="12" y1="128" x2="244" y2="128" stroke="#1A1C20" stroke-width="6"/>
    
    <!-- Central Pillar (Lex/Justice) - Crimson Accent -->
